app_name: ragms
environment: development

paths:
  project_root: .
  data_dir: data
  logs_dir: logs

llm:
  provider: qwen
  model: qwen3.5-plus
  api_key: null
  base_url: null

embedding:
  provider: qwen
  model: qwen-text-embedding-v1
  api_key: null
  base_url: null
  batch_size: 10

ingestion:
  transform:
    enable_llm_chunk_refine: false
    enable_llm_metadata_enrich: false
    chunk_refine_llm:
      provider: qwen
      model: qwen3.5-flash
      api_key: null
      base_url: null
    metadata_enrich_llm:
      provider: qwen
      model: qwen3.5-flash
      api_key: null
      base_url: null

vision_llm:
  provider: auto
  model: qwen3-vl-plus
  api_key: null
  base_url: null
  language_providers:
    zh: qwen_vl
    en: gpt4o
  environment_providers:
    development: qwen_vl
    test: qwen_vl
    production: gpt4o

vector_store:
  backend: chroma
  collection: default

storage:
  sqlite:
    path: data/metadata/ragms.db

retrieval:
  strategy: hybrid
  fusion_algorithm: rrf
  rerank_backend: cross_encoder

evaluation:
  backends:
    - custom_metrics

observability:
  enabled: true
  log_file: logs/traces.jsonl
  log_level: INFO

dashboard:
  enabled: true
  port: 8501
  traces_file: logs/traces.jsonl
