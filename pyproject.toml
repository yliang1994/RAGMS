[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ragms"
version = "0.1.0"
description = "Modular local-first RAG system with MCP-native integration."
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "RAGMS" },
]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

